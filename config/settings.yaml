# ============================================================
#  Akıllı Lojistik ve Rota Optimizasyonu
#  Merkezi Konfigürasyon Dosyası
# ============================================================

# -----------------------------------------------------------
# PROJE GENELİ
# -----------------------------------------------------------
project:
  name: "Akilli-Lojistik-Rota-Optimizasyonu"
  version: "1.0.0"
  environment: "development"          # development | staging | production
  random_seed: 42

# -----------------------------------------------------------
# DOSYA YOLLARI
# -----------------------------------------------------------
paths:
  data:
    raw: "data/raw"
    processed: "data/processed"
    external: "data/external"
  outputs:
    models: "outputs/models"
    reports: "outputs/reports"
    routes: "outputs/routes"
  logs: "logs"

# -----------------------------------------------------------
# VERİ DOSYALARI (Ham CSV'ler)
# -----------------------------------------------------------
data_files:
  routes: "routes.csv"
  route_stops: "route_stops.csv"
  traffic_segments: "traffic_segments.csv"
  weather_observations: "weather_observations.csv"
  historical_delay_stats: "historical_delay_stats.csv"

# -----------------------------------------------------------
# VERİ ŞEMASİ
# Kolon adları, tipler ve tarih formatları — CSV schemaya göre
# -----------------------------------------------------------
schema:
  datetime_format: "%Y-%m-%d %H:%M:%S"

  routes:
    id_col: "route_id"
    datetime_cols:
      - "departure_planned"
      - "departure_actual"
    numeric_cols:
      - "num_stops"
      - "total_distance_km"
      - "planned_duration_min"
      - "actual_duration_min"
      - "total_delay_min"
      - "on_time_delivery_rate"
      - "temperature_c"
      - "precipitation_mm"
      - "wind_speed_kmh"
      - "humidity_pct"
      - "visibility_km"
      - "incident_severity"
      - "overall_delay_factor"
    categorical_cols:
      - "vehicle_type"
      - "weather_condition"
      - "traffic_level"
    binary_cols:
      - "road_incident"
    target_col: "total_delay_min"

  route_stops:
    id_cols:
      - "route_id"
      - "stop_id"
    datetime_cols:
      - "planned_arrival"
      - "actual_arrival"
      - "time_window_open"
      - "time_window_close"
    numeric_cols:
      - "stop_sequence"
      - "latitude"
      - "longitude"
      - "distance_from_prev_km"
      - "planned_service_min"
      - "actual_service_min"
      - "planned_travel_min"
      - "actual_travel_min"
      - "delay_at_stop_min"
      - "delay_probability"
      - "package_count"
      - "package_weight_kg"
    categorical_cols:
      - "road_type"
    binary_cols:
      - "missed_time_window"

  traffic_segments:
    id_col: "segment_id"
    datetime_cols:
      - "timestamp"
    numeric_cols:
      - "center_lat"
      - "center_lon"
      - "hour_of_day"
      - "day_of_week"
      - "free_flow_speed_kmh"
      - "current_speed_kmh"
      - "congestion_ratio"
      - "avg_vehicle_count_per_min"
    categorical_cols:
      - "road_type"
      - "traffic_level"
    binary_cols:
      - "is_rush_hour"
      - "is_weekend"
      - "incident_reported"

  weather_observations:
    id_col: "obs_id"
    datetime_cols:
      - "timestamp"
    numeric_cols:
      - "latitude"
      - "longitude"
      - "temperature_c"
      - "feels_like_c"
      - "precipitation_mm"
      - "wind_speed_kmh"
      - "wind_direction_deg"
      - "humidity_pct"
      - "pressure_hpa"
      - "visibility_km"
      - "cloud_cover_pct"
      - "uv_index"
      - "delay_risk_score"
    categorical_cols:
      - "weather_condition"
      - "precipitation_type"
      - "road_surface_condition"

  historical_delay_stats:
    categorical_cols:
      - "road_type"
      - "traffic_level"
      - "weather_condition"
      - "time_bucket"
    numeric_cols:
      - "sample_count"
      - "mean_delay_min"
      - "median_delay_min"
      - "p90_delay_min"
      - "p95_delay_min"
      - "std_delay_min"
      - "on_time_rate"
      - "delay_probability"

# -----------------------------------------------------------
# DIŞ API'LER (External APIs)
# -----------------------------------------------------------
external_apis:
  openweather:
    base_url: "https://api.openweathermap.org/data/2.5/weather"
    api_key: "YOUR_OPENWEATHER_API_KEY"   # env: OPENWEATHER_API_KEY
    timeout_sec: 5
    units: "metric"                        # metric → °C, km/h
  mock_weather:                            # API yoksa fallback
    weather_condition: "clear"
    temperature_c: 20.0
    feels_like_c: 19.0
    precipitation_mm: 0.0
    precipitation_type: "none"
    wind_speed_kmh: 10.0
    wind_direction_deg: 180
    humidity_pct: 55.0
    pressure_hpa: 1013.0
    visibility_km: 20.0
    cloud_cover_pct: 10.0
    uv_index: 3.0
    road_surface_condition: "dry"
    delay_risk_score: 0.1

# -----------------------------------------------------------
# ÖN İŞLEME (Preprocessing)
# -----------------------------------------------------------
preprocessing:
  test_size: 0.2
  validation_size: 0.1
  missing_value_strategy: "median"    # median | mean | drop
  outlier_method: "iqr"               # iqr | zscore | none
  outlier_threshold: 3.0
  scale_features: true
  scaler: "standard"                  # standard | minmax | robust

# -----------------------------------------------------------
# FEATURE ENGINEERING
# -----------------------------------------------------------
features:
  time_features:
    - "hour_of_day"
    - "day_of_week"
    - "is_rush_hour"
    - "is_weekend"
    - "month"
  weather_features:
    - "temperature_c"
    - "precipitation_mm"
    - "wind_speed_kmh"
    - "visibility_km"
    - "humidity_pct"
    - "delay_risk_score"
  traffic_features:
    - "traffic_level"
    - "congestion_ratio"
    - "road_incident"
    - "incident_severity"
  route_features:
    - "num_stops"
    - "total_distance_km"
    - "vehicle_type"
    - "road_type"

# -----------------------------------------------------------
# MAKINE ÖĞRENMESİ MODELLERİ
# -----------------------------------------------------------
models:
  # Aşama 1: Gecikme Tahmini (Delay Prediction)
  delay_predictor:
    primary: "xgboost"
    fallback: "random_forest"
    xgboost:
      n_estimators: 300
      max_depth: 6
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      min_child_weight: 3
      reg_alpha: 0.1
      reg_lambda: 1.0
      n_jobs: -1
    random_forest:
      n_estimators: 200
      max_depth: 10
      min_samples_split: 5
      n_jobs: -1
    cross_validation:
      n_splits: 5
      scoring: "neg_mean_absolute_error"

  # Aşama 2: Rota Optimizasyonu (Route Optimization)
  route_optimizer:
    algorithm: "or_tools"             # or_tools | greedy | genetic
    time_limit_seconds: 30
    max_routes: 50
    or_tools:
      first_solution_strategy: "PATH_CHEAPEST_ARC"
      local_search_metaheuristic: "GUIDED_LOCAL_SEARCH"
      solution_limit: 100

# -----------------------------------------------------------
# API (FastAPI)
# -----------------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8000
  debug: true
  reload: true
  workers: 1
  title: "Akıllı Lojistik API"
  description: "Rota optimizasyonu ve gecikme tahmini servisi"
  version: "1.0.0"
  prefix: "/api/v1"
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

# -----------------------------------------------------------
# LOGLAMA
# -----------------------------------------------------------
logging:
  level: "INFO"                       # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  file: "logs/app.log"
  max_bytes: 10485760                 # 10 MB
  backup_count: 5
  console: true
